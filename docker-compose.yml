version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'AdminPassword123!'
    ports:
      - "1433:1433"
    volumes:
      - ./backend/setup_db.sql:/tmp/setup_db.sql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'AdminPassword123!' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - MSSQL_SERVER=db
      - MSSQL_DATABASE=SDF_Copilot
      - MSSQL_USER=sa
      - MSSQL_PASSWORD=AdminPassword123!
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
